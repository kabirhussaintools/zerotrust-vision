<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Asset Acquisition | Zero Trust Vision</title>
    <style>
        :root {
            --primary: #6366f1; 
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg); color: white; display: flex;
            align-items: center; justify-content: center; min-height: 100vh;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
        }
        .container {
            width: 90%; max-width: 450px; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            padding: 2.5rem; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .glow-text { 
            font-size: 2.2rem; margin-bottom: 0.5rem; letter-spacing: -1px;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; }
        input, textarea {
            width: 100%; padding: 16px; margin: 8px 0; background: rgba(0,0,0,0.2);
            border: 1px solid var(--border); border-radius: 12px; color: white;
        }
        .action-btn {
            width: 100%; padding: 16px; margin-top: 15px; background: var(--primary);
            color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover { background: #4f46e5; transform: scale(1.02); }
        #success-screen { display: none; padding: 2rem 0; }
        .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div class="container">
        <div id="form-section">
            <h1 class="glow-text">zerotrust.vision</h1>
            <p>This premium domain is available for acquisition. Submit your proposal.</p>
            
            <form id="offerForm" action="https://formsubmit.co/kabirhussaing95@GMAIL.COM" method="POST">
                <input type="hidden" name="_subject" value="New Offer for zerotrust.vision">
                <input type="hidden" name="_captcha" value="false">
                
                <input type="text" name="Name" placeholder="Full Name / Company" required>
                <input type="email" name="Email" placeholder="Corporate Email" required>
                <input type="tel" name="Offer_Amount" id="offerAmountInput" placeholder="$ Offer Amount" required inputmode="numeric">
                <textarea name="Message" rows="3" placeholder="Intended use..." required></textarea>
                
                <button type="submit" id="submitBtn" class="action-btn">Submit Secure Offer</button>
            </form>
        </div>

        <div id="success-screen">
            <div class="success-icon">✅</div>
            <h3>Offer Submitted</h3>
            <p>Your proposal is securely routed. We will contact you shortly.</p>
            <button onclick="location.reload()" class="action-btn">Done</button>
        </div>
    </div>

    <script>
        const offerInput = document.getElementById('offerAmountInput');
        offerInput.addEventListener('input', function() {
            let val = this.value.replace(/[^0-9]/g, '');
            this.value = val ? parseInt(val).toLocaleString() : '';
        });

        document.getElementById('offerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch(this.action, { method: 'POST', body: new FormData(this) })
            .then(() => {
                document.getElementById('form-section').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
            });
        });
    </script>
</body>
</html>
